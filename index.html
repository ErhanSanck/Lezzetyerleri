<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lezzet Rehberi - Bölgenin En İyi Restoranları</title>
<link rel="stylesheet" href="style.css">
<style>
  .city-selector-bar {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 15px 20px;
    margin-bottom: 20px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 15px;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .city-selector-bar .current-city {
    color: white;
    font-size: 18px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .city-selector-bar select {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    background: white;
    color: #333;
    font-weight: 500;
    transition: all 0.2s;
  }

  .city-selector-bar select:hover {
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  .city-selector-bar select:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
  }

  .home-title {
    color: #333;
    margin-bottom: 10px;
    font-size: 24px;
  }

  .home-subtitle {
    color: #666;
    margin-bottom: 25px;
    font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="#/" class="logo" onclick="navigate('/')">🍽️ Lezzet Rehberi</a>
    <div class="search-box">
      <span class="icon" id="searchIcon" style="cursor:pointer;">🔎</span>
      <input id="searchInput" type="text" placeholder="Lokanta, mahalle veya ürün ara...">
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>
</header>

<main class="container" id="app"></main>

<footer>Lezzet Rehberi — Bölgenizdeki en iyi lokantalar bir arada. · 

<script type="module" src="data.js"></script>
<script type="module">
const app = document.getElementById('app');
let selectedCitySlug = 'istanbul'; // Varsayılan şehir
const DEFAULT_CITY = 'istanbul';

// Global navigasyonu modül dışına açıyoruz
window.navigate = function(hash) {
  window.location.hash = hash;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

function formatPrice(n) {
  return Number(n).toLocaleString('tr-TR', { minimumFractionDigits: 0 }) + ' ₺';
}

/* ----------------------- Ana Sayfa: Mevcut Şehrin Lokantaları ----------------------- */
async function renderHome() {
  app.innerHTML = `<div class="empty-state">Yükleniyor...</div>`;
  const city = await RestoranDB.getCityBySlug(selectedCitySlug);

  if (!city) {
    app.innerHTML = `<div class="empty-state"><span class="emoji">🤔</span>Şehir bulunamadı.</div>`;
    return;
  }

  const restaurants = await RestoranDB.getRestaurants({ citySlug: selectedCitySlug });
  const cities = await RestoranDB.getCities();

  app.innerHTML = `
    <div class="city-selector-bar">
      <div class="current-city">${city.emoji} ${escapeHtml(city.name)}</div>
      <select id="citySelect" onchange="changeCityFromSelect(this.value)">
        ${cities.map(c => `
          <option value="${c.slug}" ${c.slug === selectedCitySlug ? 'selected' : ''}>
            ${c.emoji} ${escapeHtml(c.name)}
          </option>
        `).join('')}
      </select>
    </div>

    <h1 class="home-title">${city.emoji} ${escapeHtml(city.name)}'deki En İyi Lokantalar</h1>
    <p class="home-subtitle">Bölgenin en lezzetli mekanlarını keşfedin</p>

    ${renderRestaurantGridWithCategories(restaurants, selectedCitySlug)}
  `;
}

function renderRestaurantGridWithCategories(restaurants, citySlug) {
  if (!restaurants.length) {
    return `<div class="empty-state"><span class="emoji">🍽️</span>Bu şehirde henüz lokanta eklenmemiş.</div>`;
  }

  return `
    <div class="restaurant-grid">
      ${restaurants.map(r => `
        <div class="restaurant-card" onclick="navigate('#/sehir/${citySlug}/restoran/${r.id}')">
          <div class="thumb">
            ${r.image ? `<img src="${r.image}" alt="${escapeHtml(r.name)}">` : (r.category ? r.category.emoji : '🍽️')}
          </div>
          <div class="body">
            <div class="name">${escapeHtml(r.name)}</div>
            <div class="address">📍 ${escapeHtml(r.address || 'Adres belirtilmemiş')}</div>
            ${r.category ? `<span class="tag">${escapeHtml(r.category.name)}</span>` : ''}
            ${r.subcategory ? `<span class="tag">${escapeHtml(r.subcategory.name)}</span>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

window.changeCityFromSelect = function(slug) {
  selectedCitySlug = slug;
  renderHome();
}

/* ----------------------- Sayfa: Şehir Seçimi ----------------------- */
async function renderCitySelect() {
  app.innerHTML = `<div class="empty-state">Yükleniyor...</div>`;
  const cities = await RestoranDB.getCities();

  app.innerHTML = `
    <h1 class="page-title">Bölgenizi Seçin</h1>
    <p class="page-subtitle">Hangi şehirdeki restoranları görmek istiyorsunuz?</p>
    <div class="city-grid">
      ${cities.map(city => `
        <div class="city-card" onclick="selectCity('${city.slug}')">
          <span class="emoji">${city.emoji}</span>
          <div class="name">${escapeHtml(city.name)}</div>
          <div class="count">${city.restaurantCount} lokanta</div>
        </div>
      `).join('')}
    </div>
  `;
}

window.selectCity = function(slug) {
  selectedCitySlug = slug;
  window.location.hash = `#/sehir/${slug}`;
}

/* ----------------------- Sayfa: Şehir Ana Sayfası ----------------------- */
async function renderCityHome(slug) {
  app.innerHTML = `<div class="empty-state">Yükleniyor...</div>`;
  const city = await RestoranDB.getCityBySlug(slug);

  if (!city) {
    app.innerHTML = `<div class="empty-state"><span class="emoji">🤔</span>Şehir bulunamadı.</div>`;
    return;
  }

  selectedCitySlug = slug;
  const categories = await RestoranDB.getCategories();

  app.innerHTML = `
    <div class="city-header">
      <button class="btn-back" onclick="navigate('/')">← Ana Sayfa</button>
      <h1 class="page-title">${city.emoji} ${escapeHtml(city.name)}</h1>
      <p class="page-subtitle">En iyi restoranlar ve menüleri keşfedin.</p>
    </div>
    <div class="category-grid">
      ${categories.map(cat => `
        <div class="category-card" onclick="navigate('#/sehir/${slug}/kategori/${cat.slug}')">
          <span class="emoji">${cat.emoji}</span>
          <div class="name">${escapeHtml(cat.name)}</div>
          <div class="count">${cat.restaurantCount} lokanta</div>
        </div>
      `).join('')}
    </div>
  `;
}

/* ----------------------- Sayfa: Kategori ----------------------- */
async function renderCategory(citySlug, catSlug, subSlug) {
  app.innerHTML = `<div class="empty-state">Yükleniyor...</div>`;
  const city = await RestoranDB.getCityBySlug(citySlug);
  const category = await RestoranDB.getCategoryBySlug(catSlug);

  if (!city || !category) {
    app.innerHTML = `<div class="empty-state"><span class="emoji">🤔</span>Kategori bulunamadı.</div>`;
    return;
  }

  selectedCitySlug = citySlug;
  const restaurants = await RestoranDB.getRestaurants({
    citySlug: citySlug,
    categorySlug: catSlug,
    subcategorySlug: subSlug || null
  });

  const activeSub = subSlug ? category.subcategories.find(s => s.slug === subSlug) : null;

  app.innerHTML = `
    <div class="breadcrumb">
      <a href="#/" onclick="navigate('#/')">Ana Sayfa</a> / 
      <a href="#/sehir/${citySlug}" onclick="navigate('#/sehir/${citySlug}')">${escapeHtml(city.name)}</a> / 
      ${escapeHtml(category.name)}
    </div>
    <h1 class="page-title">${category.emoji} ${escapeHtml(category.name)}</h1>
    <p class="page-subtitle">${activeSub ? escapeHtml(activeSub.name) + ' seçildi' : 'Tüm lokantalar listeleniyor'}</p>

    ${category.subcategories && category.subcategories.length ? `
      <div class="subcat-row">
        <div class="subcat-chip ${!subSlug ? 'active' : ''}" onclick="navigate('#/sehir/${citySlug}/kategori/${catSlug}')">Tümü</div>
        ${category.subcategories.map(sub => `
          <div class="subcat-chip ${subSlug === sub.slug ? 'active' : ''}"
               onclick="navigate('#/sehir/${citySlug}/kategori/${catSlug}/alt/${sub.slug}')">
            ${sub.emoji} ${escapeHtml(sub.name)}
          </div>
        `).join('')}
      </div>
    ` : ''}

    ${renderRestaurantGrid(restaurants, citySlug)}
  `;
}

function renderRestaurantGrid(restaurants, citySlug) {
  if (!restaurants.length) {
    return `<div class="empty-state"><span class="emoji">🍽️</span>Bu kategoride henüz lokanta eklenmemiş.</div>`;
  }

  return `
    <div class="restaurant-grid">
      ${restaurants.map(r => `
        <div class="restaurant-card" onclick="navigate('#/sehir/${citySlug}/restoran/${r.id}')">
          <div class="thumb">
            ${r.image ? `<img src="${r.image}" alt="${escapeHtml(r.name)}">` : (r.category ? r.category.emoji : '🍽️')}
          </div>
          <div class="body">
            <div class="name">${escapeHtml(r.name)}</div>
            <div class="address">📍 ${escapeHtml(r.address || 'Adres belirtilmemiş')}</div>
            ${r.subcategory ? `<span class="tag">${escapeHtml(r.subcategory.name)}</span>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

/* ----------------------- Sayfa: Restoran detay ----------------------- */
async function renderRestaurantDetail(citySlug, id) {
  app.innerHTML = `<div class="empty-state">Yükleniyor...</div>`;
  const r = await RestoranDB.getRestaurantById(id);
  const city = await RestoranDB.getCityBySlug(citySlug);

  if (!r || !city) {
    app.innerHTML = `<div class="empty-state"><span class="emoji">🤔</span>Lokanta bulunamadı.</div>`;
    return;
  }

  selectedCitySlug = citySlug;
  const backHash = r.category ? `#/sehir/${citySlug}/kategori/${r.category.slug}` : `#/sehir/${citySlug}`;

  app.innerHTML = `
    <div class="breadcrumb">
      <a href="#/" onclick="navigate('#/')">Ana Sayfa</a> /
      <a href="#/sehir/${citySlug}" onclick="navigate('#/sehir/${citySlug}')">${escapeHtml(city.name)}</a> /
      <a href="${backHash}" onclick="navigate('${backHash}')">${r.category ? escapeHtml(r.category.name) : ''}</a> /
      ${escapeHtml(r.name)}
    </div>

    <div class="detail-header">
      <div class="detail-thumb">
        ${r.image ? `<img src="${r.image}" alt="${escapeHtml(r.name)}">` : (r.category ? r.category.emoji : '🍽️')}
      </div>
      <div class="detail-info">
        <div class="name">${escapeHtml(r.name)}</div>
        <div class="address">📍 ${escapeHtml(r.address || 'Adres belirtilmemiş')}</div>
        ${r.phone ? `<div class="phone">📞 ${escapeHtml(r.phone)}</div>` : ''}
        ${r.description ? `<div class="description">${escapeHtml(r.description)}</div>` : ''}
      </div>
    </div>

    <div class="menu-section">
      <h2>Menü</h2>
      ${r.menuItems && r.menuItems.length ? `
        <table class="menu-table">
          <thead><tr><th>Ürün</th><th style="text-align:right">Fiyat</th></tr></thead>
          <tbody>
            ${r.menuItems.map(m => `
              <tr><td>${escapeHtml(m.name)}</td><td class="price">${formatPrice(m.price)}</td></tr>
            `).join('')}
          </tbody>
        </table>
      ` : `<p class="page-subtitle">Menü bilgisi henüz eklenmemiş.</p>`}
    </div>
  `;
}

/* ----------------------- Sayfa: Arama sonuçları ----------------------- */
async function renderSearchPage(query) {
  const decoded = decodeURIComponent(query || '');
  const results = await RestoranDB.getRestaurants({ query: decoded });

  app.innerHTML = `
    <div class="breadcrumb"><a href="#/" onclick="navigate('#/')">Ana Sayfa</a> / Arama sonuçları</div>
    <h1 class="page-title">"${escapeHtml(decoded)}" için arama sonuçları</h1>
    <p class="page-subtitle">${results.length} lokanta bulundu</p>
    ${renderRestaurantGridNoCity(results)}
  `;
}

function renderRestaurantGridNoCity(restaurants) {
  if (!restaurants.length) {
    return `<div class="empty-state"><span class="emoji">🍽️</span>Arama sonucu bulunamadı.</div>`;
  }

  return `
    <div class="restaurant-grid">
      ${restaurants.map(r => `
        <div class="restaurant-card" onclick="navigate('#/sehir/${r.city.slug}/restoran/${r.id}')">
          <div class="thumb">
            ${r.image ? `<img src="${r.image}" alt="${escapeHtml(r.name)}">` : (r.category ? r.category.emoji : '🍽️')}
          </div>
          <div class="body">
            <div class="name">${escapeHtml(r.name)}</div>
            <div class="address">📍 ${escapeHtml(r.address || 'Adres belirtilmemiş')}</div>
            ${r.subcategory ? `<span class="tag">${escapeHtml(r.subcategory.name)}</span>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

/* ----------------------- Arama motoru tetikleyicileri ----------------------- */
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

async function renderSearchResults(query) {
  if (!query.trim()) {
    searchResults.classList.remove('show');
    searchResults.innerHTML = '';
    return;
  }

  const allResults = await RestoranDB.getRestaurants({ query });
  const results = allResults.slice(0, 8);

  if (!results.length) {
    searchResults.innerHTML = `<div class="search-empty">"${escapeHtml(query)}" için sonuç bulunamadı.</div>`;
  } else {
    searchResults.innerHTML = results.map(r => `
      <div class="search-result-item" onclick="selectSearchResult('${r.city.slug}', '${r.id}')">
        <div class="name">${escapeHtml(r.name)}</div>
        <div class="meta">${r.city.name} · ${r.category ? escapeHtml(r.category.name) : ''} · ${escapeHtml(r.address || '')}</div>
      </div>
    `).join('');
  }
  searchResults.classList.add('show');
}

window.selectSearchResult = function(citySlug, id) {
  searchInput.value = '';
  searchResults.classList.remove('show');
  navigate(`#/sehir/${citySlug}/restoran/${id}`);
}

function submitSearch() {
  const value = searchInput.value.trim();
  if (!value) return;
  searchResults.classList.remove('show');
  navigate(`#/arama/${encodeURIComponent(value)}`);
}

searchInput.addEventListener('input', (e) => renderSearchResults(e.target.value));
searchInput.addEventListener('focus', (e) => { if (e.target.value.trim()) renderSearchResults(e.target.value); });
searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitSearch(); });
document.getElementById('searchIcon').addEventListener('click', submitSearch);
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-box')) searchResults.classList.remove('show');
});

/* ----------------------- Router ----------------------- */
function router() {
  const hash = window.location.hash || '#/';
  const parts = hash.replace(/^#\//, '').split('/').filter(Boolean);

  if (parts.length === 0) {
    // Ana sayfa - mevcut şehrın lokantaları
    renderHome();
  } else if (parts[0] === 'sehir' && parts[1]) {
    if (parts[2] === 'kategori' && parts[3]) {
      if (parts[4] === 'alt' && parts[5]) {
        renderCategory(parts[1], parts[3], parts[5]);
      } else {
        renderCategory(parts[1], parts[3]);
      }
    } else if (parts[2] === 'restoran' && parts[3]) {
      renderRestaurantDetail(parts[1], parts[3]);
    } else {
      renderCityHome(parts[1]);
    }
  } else if (parts[0] === 'arama' && parts[1]) {
    renderSearchPage(parts[1]);
    searchInput.value = decodeURIComponent(parts[1]);
  } else {
    renderHome();
  }
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', router);
router();
</script>
</body>
</html>
